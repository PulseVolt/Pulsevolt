<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Pulse Volt</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #1f1147 0%, #080314 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: #fff;
    }

    /* ===== BACKGROUND AIRFLOW ANIMATION ===== */
    .wind-lines {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    .wind {
        position: absolute;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.8), transparent);
        border-radius: 50%;
        animation: blow linear infinite;
        opacity: 0;
    }

    /* Generating multiple wind lines with different speeds and positions */
    .wind:nth-child(1) { top: 20%; left: -10%; width: 200px; animation-duration: 3s; animation-delay: 0s; }
    .wind:nth-child(2) { top: 35%; left: -10%; width: 300px; animation-duration: 2.5s; animation-delay: 1s; }
    .wind:nth-child(3) { top: 50%; left: -10%; width: 150px; animation-duration: 2s; animation-delay: 0.5s; }
    .wind:nth-child(4) { top: 65%; left: -10%; width: 250px; animation-duration: 3.2s; animation-delay: 1.5s; }
    .wind:nth-child(5) { top: 80%; left: -10%; width: 200px; animation-duration: 2.8s; animation-delay: 0.2s; }

    @keyframes blow {
        0% { transform: translateX(0); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateX(120vw); opacity: 0; }
    }

    /* ===== TURBINE & CONG ANIMATION ===== */
    .system-container {
        position: relative;
        width: 400px;
        height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
        margin-bottom: 40px;
    }

    /* The CONG (Convergent Nozzle) representation */
    .cong-funnel {
        position: absolute;
        left: 0;
        width: 150px;
        height: 200px;
        border-top: 4px solid rgba(0, 229, 255, 0.3);
        border-bottom: 4px solid rgba(0, 229, 255, 0.3);
        border-right: 4px solid rgba(0, 229, 255, 0.8);
        border-radius: 50% 10% 10% 50%;
        box-shadow: inset -20px 0 30px rgba(0, 229, 255, 0.1);
    }

    .cong-funnel::after {
        content: "CONG";
        position: absolute;
        top: -30px;
        left: 50px;
        color: #00e5ff;
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 0.8rem;
    }

    /* The Lenz2 Turbine */
    .turbine-base {
        position: absolute;
        right: 80px;
        width: 120px;
        height: 180px;
        perspective: 800px;
    }

    .rotor {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        animation: spin 1.5s linear infinite;
    }

    /* Central Shaft */
    .shaft {
        position: absolute;
        left: 50%;
        top: -10%;
        bottom: -10%;
        width: 6px;
        margin-left: -3px;
        background: #cbd5e1;
        box-shadow: 0 0 10px #00e5ff;
    }

    /* Lenz2 Blades (Stylized as 3 curved plates) */
    .blade {
        position: absolute;
        top: 0;
        left: 50%;
        width: 50px;
        height: 100%;
        margin-left: -25px;
        background: rgba(0, 229, 255, 0.2);
        border: 2px solid #00e5ff;
        border-radius: 10px;
        box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.5);
    }

    /* Positioning the 3 blades in 3D space */
    .blade:nth-child(2) { transform: rotateY(0deg) translateZ(50px); }
    .blade:nth-child(3) { transform: rotateY(120deg) translateZ(50px); }
    .blade:nth-child(4) { transform: rotateY(240deg) translateZ(50px); }

    @keyframes spin {
        from { transform: rotateY(0deg); }
        to { transform: rotateY(360deg); }
    }

    /* ===== TEXT & BUTTON ===== */
    .content-box {
        text-align: center;
        z-index: 2;
    }

    .logo {
        font-size: 3rem;
        font-weight: 800;
        margin: 0 0 10px 0;
        letter-spacing: 4px;
        text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
    }

    .logo span {
        color: #00e5ff;
        animation: pulseText 2s infinite;
    }

    .subtitle {
        color: #c4b5fd;
        font-size: 1.2rem;
        margin-bottom: 40px;
        letter-spacing: 1px;
    }

    .start-btn {
        background: transparent;
        color: #00e5ff;
        border: 2px solid #00e5ff;
        padding: 15px 50px;
        font-size: 1.2rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 3px;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        text-decoration: none;
        display: inline-block;
    }

    .start-btn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.4), transparent);
        transition: all 0.4s ease;
    }

    .start-btn:hover {
        background: rgba(0, 229, 255, 0.1);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.6), inset 0 0 10px rgba(0, 229, 255, 0.4);
        transform: scale(1.05);
    }

    .start-btn:hover::before {
        left: 100%;
    }

    @keyframes pulseText {
        0%, 100% { text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        50% { text-shadow: 0 0 25px rgba(0, 229, 255, 1); }
    }

</style>
</head>
<body>

    <div class="wind-lines">
        <div class="wind"></div>
        <div class="wind"></div>
        <div class="wind"></div>
        <div class="wind"></div>
        <div class="wind"></div>
    </div>

    <div class="system-container">
        <div class="cong-funnel"></div>
        
        <div class="turbine-base">
            <div class="rotor">
                <div class="shaft"></div>
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
            </div>
        </div>
    </div>

    <div class="content-box">
        <h1 class="logo">Pulse<span>Volt</span></h1>
        <p class="subtitle">Sustainable Urban Wind Energy</p>
        
        <a href="10119.html" class="start-btn">Initialize System</a>
    </div>

</body>
</html>
